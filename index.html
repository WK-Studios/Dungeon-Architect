<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --metal-light: #7a6347;
            --metal-dark: #3b2b1c;
            --blood-dark: #4a0909;
            --blood-light: #8f1717;
            --text-gothic: #d4c4b7;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #0a0505; border-left: 1px solid var(--metal-dark); }
        ::-webkit-scrollbar-thumb { background: var(--metal-dark); border: 1px solid var(--metal-light); }
        ::-webkit-scrollbar-thumb:hover { background: #4a3624; }
        
        body {
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-gothic);
            background-color: #0a0505;
            background-image: 
                radial-gradient(circle at 50% 50%, #1a0808 0%, #050202 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
        }

        h1, h2, h3, .font-title {
            font-family: 'Cinzel', serif;
            text-shadow: 2px 2px 4px #000;
        }

        .metal-panel {
            background: rgba(10, 5, 5, 0.85);
            border: 2px solid var(--metal-dark);
            box-shadow: inset 0 0 20px #000, 0 8px 16px rgba(0,0,0,0.9);
            position: relative;
        }

        .metal-panel::before, .metal-panel::after {
            content: ''; position: absolute; pointer-events: none;
            width: 12px; height: 12px;
            border: 2px solid var(--metal-light);
            z-index: 10;
        }
        .metal-panel::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .metal-panel::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        
        .corner-tr { position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; border-top: 2px solid var(--metal-light); border-right: 2px solid var(--metal-light); pointer-events: none; z-index: 10; }
        .corner-bl { position: absolute; bottom: -2px; left: -2px; width: 12px; height: 12px; border-bottom: 2px solid var(--metal-light); border-left: 2px solid var(--metal-light); pointer-events: none; z-index: 10; }

        .btn-gothic {
            background: linear-gradient(to bottom, #2a1f16, #140e0a);
            border: 1px solid var(--metal-dark);
            color: var(--metal-light);
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            font-weight: 700;
            box-shadow: inset 0 0 5px #000, 0 2px 5px #000;
            transition: all 0.2s ease;
            position: relative;
            font-size: 0.75rem;
        }
        .btn-gothic:hover {
            background: linear-gradient(to bottom, #3b2b1c, #1f150e);
            color: #ebd8c3;
            border-color: var(--metal-light);
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }
        .btn-gothic.active {
            background: linear-gradient(to bottom, var(--blood-light), var(--blood-dark));
            color: #fff;
            border-color: #ff6b6b;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 10px rgba(143, 23, 23, 0.6);
            text-shadow: 1px 1px 2px #000;
        }

        .input-gothic {
            background: #050303;
            border: 1px solid var(--metal-dark);
            color: var(--text-gothic);
            box-shadow: inset 0 2px 5px #000;
        }
        .input-gothic:focus {
            outline: none;
            border-color: var(--blood-light);
            box-shadow: inset 0 2px 5px #000, 0 0 8px rgba(143, 23, 23, 0.4);
        }

        .tab-btn {
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            color: var(--metal-dark);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--metal-light); }
        .tab-btn.active {
            color: var(--blood-light);
            border-bottom: 2px solid var(--blood-light);
            background: linear-gradient(to top, rgba(74, 9, 9, 0.3), transparent);
            text-shadow: 0 0 10px rgba(143, 23, 23, 0.3);
        }

        .texture-slot {
            background: #080505;
            border: 1px dashed var(--metal-dark);
            transition: all 0.2s;
        }
        .texture-slot:hover {
            border-color: var(--blood-light);
            background: #1a0a0a;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col selection:bg-[#4a0909] selection:text-white">

    <!-- Main App Area -->
    <div class="flex-1 flex flex-row overflow-hidden relative">
        <!-- Sidebar / Controls -->
        <aside class="w-80 border-r-2 border-[#3b2b1c] flex flex-col h-full z-10 shrink-0 metal-panel bg-opacity-100 overflow-hidden">
            <div class="corner-tr"></div><div class="corner-bl"></div>
            <div class="p-5 border-b border-[#3b2b1c] flex items-center justify-center bg-black/40 shadow-md">
                <h1 class="text-2xl font-bold text-[#8f1717] flex items-center gap-2 font-title tracking-widest text-center" style="text-shadow: 0 0 10px rgba(143,23,23,0.5), 2px 2px 4px #000;">
                    Dungeon Architect
                </h1>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-6 relative">
                
                <!-- Layer Selector -->
                <div>
                    <h2 class="text-sm font-title text-[#7a6347] mb-2 border-b border-[#3b2b1c] pb-1">Map Layers</h2>
                    <div class="flex gap-2">
                        <button id="btn-layer-0" class="layer-btn active btn-gothic flex-1 py-1.5 rounded-sm focus:outline-none tracking-wider text-xs">Level 1</button>
                        <button id="btn-layer-1" class="layer-btn btn-gothic flex-1 py-1.5 rounded-sm focus:outline-none tracking-wider text-xs">Level 2</button>
                        <button id="btn-layer-2" class="layer-btn btn-gothic flex-1 py-1.5 rounded-sm focus:outline-none tracking-wider text-xs">Level 3</button>
                    </div>
                </div>

                <!-- Tools -->
                <div>
                    <h2 class="text-sm font-title text-[#7a6347] mb-3 border-b border-[#3b2b1c] pb-1">Tools & Actions</h2>
                    
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <button id="btn-draw" class="btn-gothic active py-2 rounded-sm focus:outline-none tracking-wider">Draw</button>
                        <button id="btn-erase-tile" class="btn-gothic py-2 rounded-sm focus:outline-none tracking-wider leading-tight">Erase<br>Tile</button>
                        <button id="btn-erase-env" class="btn-gothic py-2 rounded-sm focus:outline-none tracking-wider leading-tight">Erase<br>Env</button>
                    </div>

                    <div class="grid grid-cols-3 gap-2 mb-4 border-b border-[#3b2b1c] pb-4">
                        <button id="btn-undo" class="btn-gothic py-1.5 rounded-sm focus:outline-none tracking-wider">Undo</button>
                        <button id="btn-redo" class="btn-gothic py-1.5 rounded-sm focus:outline-none tracking-wider">Redo</button>
                        <button id="btn-clear" class="btn-gothic py-1.5 rounded-sm focus:outline-none tracking-wider text-[#ff6b6b]">Clear</button>
                    </div>
                    
                    <div class="bg-[#140e0a] border border-[#3b2b1c] p-2 rounded-sm mb-2 shadow-inner">
                        <div class="text-[10px] text-[#7a6347] font-semibold uppercase mb-2 border-b border-[#3b2b1c] pb-1 text-center">Group & Optimize For Export</div>
                        <div class="grid grid-cols-2 gap-2 pl-2">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="opt-floor" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="opt-floor">Floors</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="opt-ceil" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="opt-ceil">Ceilings</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="opt-wall" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="opt-wall">Walls</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="opt-stairs" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="opt-stairs">Stairs</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="opt-ladder" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="opt-ladder">Ladders</label>
                            </div>
                        </div>
                    </div>
                    
                    <button id="btn-export" class="btn-gothic w-full py-2.5 rounded-sm flex justify-center items-center gap-2 focus:outline-none tracking-wider" style="color: #a3b899; border-color: #4a5c40; font-size: 0.85rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export 3D Model (.GLB)
                    </button>
                </div>

                <!-- Auto Generate -->
                <div class="metal-panel p-4 rounded-sm">
                    <div class="corner-tr"></div><div class="corner-bl"></div>
                    <div class="flex justify-between items-center cursor-pointer mb-2" id="toggle-generator">
                        <h2 class="text-sm font-title text-[#7a6347] select-none">Random Generator</h2>
                        <span id="gen-chevron" class="text-[#7a6347] transition-transform duration-200" style="transform: rotate(180deg);">▼</span>
                    </div>
                    
                    <div id="generator-options" class="space-y-3 pt-2 border-t border-[#3b2b1c]">
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="block text-xs text-[#a89f91] font-semibold uppercase">Seed</label>
                                <div class="flex items-center gap-1">
                                    <input type="checkbox" id="gen-auto-seed" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                    <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="gen-auto-seed">Auto-Random</label>
                                </div>
                            </div>
                            <input type="text" id="gen-seed" placeholder="Enter seed..." class="input-gothic w-full rounded-sm px-2 py-1.5 text-sm font-mono">
                        </div>
                        
                        <div class="flex gap-3">
                            <div class="flex-1">
                                <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Min Cells</label>
                                <input type="number" id="input-min" value="20" class="input-gothic w-full rounded-sm px-2 py-1.5 text-sm">
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Max Cells</label>
                                <input type="number" id="input-max" value="60" class="input-gothic w-full rounded-sm px-2 py-1.5 text-sm">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="gen-structured" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="gen-structured">Formatted Layout (Rooms/Halls)</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="gen-castle" class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="gen-castle">Castle Style Layout</label>
                            </div>
                            
                            <!-- Custom Castle Options -->
                            <div id="gen-castle-options" class="hidden grid-cols-3 gap-2 pt-1 border-l-2 border-[#8f1717] pl-2 ml-1 mb-2">
                                <div><label class="block text-[9px] text-[#7a6347] font-semibold uppercase">Hall Width</label><input type="number" id="gen-hall-width" value="1" min="1" max="5" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                                <div><label class="block text-[9px] text-[#7a6347] font-semibold uppercase">Min Room</label><input type="number" id="gen-room-min" value="3" min="2" max="15" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                                <div><label class="block text-[9px] text-[#7a6347] font-semibold uppercase">Max Room</label><input type="number" id="gen-room-max" value="7" min="3" max="20" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                            </div>

                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="gen-overlap" checked class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="gen-overlap">Prevent Overlap</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="gen-multilevel" class="accent-[#8f1717] w-3 h-3 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                <label class="text-[10px] text-[#a89f91] uppercase cursor-pointer" for="gen-multilevel">Randomize L1-L3 (Multi-Level)</label>
                            </div>
                        </div>

                        <div id="gen-prob-options" class="grid grid-cols-3 gap-2 pt-1">
                            <div><label class="block text-[10px] text-[#7a6347] font-semibold uppercase">Rooms %</label><input type="number" id="gen-p-room" value="60" min="0" max="100" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                            <div><label class="block text-[10px] text-[#7a6347] font-semibold uppercase">Halls %</label><input type="number" id="gen-p-hall" value="40" min="0" max="100" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                            <div><label class="block text-[10px] text-[#7a6347] font-semibold uppercase">Junctions</label><input type="number" id="gen-p-junc" value="30" min="0" max="100" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                        </div>

                        <!-- Environment Corner Spawning -->
                        <div class="pt-2 border-t border-[#3b2b1c]">
                            <div class="flex items-center justify-between mb-1">
                                <label class="block text-xs text-[#a89f91] font-semibold uppercase">Env Spawning (Corners)</label>
                                <span class="text-[10px] text-[#7a6347] font-mono"><span id="val-env-chance">25</span>%</span>
                            </div>
                            <input type="range" id="gen-env-chance" min="0" max="100" value="25" class="w-full accent-[#8f1717]">
                        </div>

                        <div id="gen-connection-options" class="hidden pt-2 border-t border-[#3b2b1c]">
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Specific Vertical Connection</label>
                            <select id="gen-connection" class="input-gothic w-full rounded-sm px-2 py-1.5 text-xs cursor-pointer text-[#d4c4b7]">
                                <option value="auto">Auto (Any Stair/Ladder)</option>
                            </select>
                        </div>

                        <button id="btn-generate" class="btn-gothic w-full py-2.5 rounded-sm tracking-wider text-sm text-[#8f1717] mt-2">Generate Map</button>
                    </div>
                </div>

                <!-- 3D Settings -->
                <div class="metal-panel p-4 rounded-sm">
                    <div class="corner-tr"></div><div class="corner-bl"></div>
                    <h2 class="text-sm font-title text-[#7a6347] mb-3 border-b border-[#3b2b1c] pb-1">3D Settings</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Floor/Ceil Thickness: <span id="val-thickness" class="text-white">0.05</span></label>
                            <input type="range" id="setting-thickness" min="0.01" max="0.5" step="0.01" value="0.05" class="w-full accent-[#8f1717]">
                        </div>
                        
                        <div class="pt-2 border-t border-[#3b2b1c]">
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Level Heights</label>
                            <div class="grid grid-cols-3 gap-2">
                                <div><label class="block text-[10px] text-[#7a6347] text-center">L1</label><input type="number" id="h-l0" value="1" step="0.1" min="0.1" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                                <div><label class="block text-[10px] text-[#7a6347] text-center">L2</label><input type="number" id="h-l1" value="1" step="0.1" min="0.1" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                                <div><label class="block text-[10px] text-[#7a6347] text-center">L3</label><input type="number" id="h-l2" value="1" step="0.1" min="0.1" class="input-gothic w-full rounded-sm px-1 py-1 text-xs text-center"></div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between pt-2 border-t border-[#3b2b1c]">
                            <label class="text-xs text-[#a89f91] font-semibold uppercase">Torch Color</label>
                            <input type="color" id="light-color" value="#ffaa55" class="w-8 h-8 rounded-sm cursor-pointer border border-[#3b2b1c] p-0 bg-black">
                        </div>
                        <div>
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Torch Intensity: <span id="val-intensity" class="text-white">1.5</span></label>
                            <input type="range" id="light-intensity" min="0" max="5" step="0.1" value="1.5" class="w-full accent-[#8f1717]">
                        </div>
                        <div>
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Torch Distance: <span id="val-distance" class="text-white">8</span></label>
                            <input type="range" id="light-distance" min="2" max="20" step="1" value="8" class="w-full accent-[#8f1717]">
                        </div>
                        <div class="flex items-center gap-2 pt-1">
                            <input type="checkbox" id="light-flicker" checked class="accent-[#8f1717] w-4 h-4 rounded-sm bg-black border-[#3b2b1c]">
                            <label class="text-xs text-[#a89f91] font-semibold uppercase">Enable Flicker</label>
                        </div>
                    </div>
                </div>

                <!-- Cell Presets -->
                <div>
                    <div class="flex items-center justify-between mb-2 border-b border-[#3b2b1c] pb-1">
                        <h2 class="text-sm font-title text-[#7a6347]">Cell Presets</h2>
                        <button id="btn-add-preset" class="text-[#8f1717] hover:text-[#ff6b6b] text-sm font-bold font-title tracking-wider transition-colors">+ Add Preset</button>
                    </div>
                    <div id="presets-list" class="space-y-2 mb-4 max-h-40 overflow-y-auto pr-1">
                        <!-- Dynamic presets inserted here -->
                    </div>

                    <!-- Active Preset Editor -->
                    <div id="preset-editor" class="metal-panel p-4 rounded-sm space-y-4 mb-8">
                        <div class="corner-tr"></div><div class="corner-bl"></div>
                        <div>
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Preset Name</label>
                            <input type="text" id="edit-name" class="input-gothic w-full rounded-sm px-2 py-1.5 text-sm font-bold text-[#d4c4b7]">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Map Color</label>
                                <div class="flex gap-2">
                                    <input type="color" id="edit-color" class="w-8 h-8 rounded-sm cursor-pointer border border-[#3b2b1c] p-0 bg-black shrink-0">
                                    <input type="text" id="edit-color-hex" class="input-gothic w-full rounded-sm px-2 py-1 text-sm uppercase font-mono">
                                </div>
                            </div>
                        </div>
                        
                        <div class="pt-3 border-t border-[#3b2b1c]">
                            <label class="block text-xs text-[#a89f91] mb-1 font-semibold uppercase">Cell Type / 3D Model</label>
                            <select id="edit-special-type" class="input-gothic w-full rounded-sm px-2 py-1.5 text-sm cursor-pointer text-[#d4c4b7]">
                                <option value="none">Normal Room/Corridor</option>
                                <option value="stairs">Staircase (Punch Hole)</option>
                                <option value="ladder">Ladder Shaft (Punch Hole)</option>
                                <option value="custom">Custom Room (.glb)</option>
                                <option value="environment">Environment Object (.glb)</option>
                            </select>
                            
                            <!-- Unhidden toggles for all structural types -->
                            <div id="hole-options" class="mt-2 space-y-1">
                                <div id="auto-scale-container" class="flex items-center gap-2 mt-2 hidden">
                                    <input type="checkbox" id="edit-auto-scale" class="accent-[#8f1717] w-4 h-4 rounded-sm bg-black border-[#3b2b1c] cursor-pointer">
                                    <label class="text-xs text-[#a89f91] font-semibold uppercase leading-tight cursor-pointer" for="edit-auto-scale">Auto-Scale to Level Height</label>
                                </div>
                                <div class="flex items-center gap-2">

    <script>
        const GRID_SIZE = 40;
        const CELL_SIZE = 24; 
        
        const state = {
            grid: [
                Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)), // Level 1
                Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)), // Level 2
                Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null))  // Level 3
            ],
            envGrid: [
                Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)),
                Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)),
                Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null))
            ],
            history: [],
            historyIndex: -1,
            level: 0,
            levelHeights: [1, 1, 1],
            tool: 'draw', 
            view: '2d',
            activePresetId: 1,
            presets: [],
            isDrawing: false,
            lastDrawCoords: {x: -1, y: -1},
            thickness: 0.05
        };

        const materialCache = {}; 
        const textureLoader = new THREE.TextureLoader();
        const gltfLoader = new THREE.GLTFLoader();
        const modelCache = {}; 
        const trimModelCache = {}; 

        // Core Mathematical Functions for Variable Heights
        function getLayerBottom(layer) {
            let y = 0; 
            for(let i=0; i<layer; i++) y += state.levelHeights[i];
            return y;
        }

        function getLayerTop(layer) {
            return getLayerBottom(layer) + state.levelHeights[layer];
        }

        function getLayerCenter(layer) {
            return getLayerBottom(layer) + (state.levelHeights[layer] / 2);
        }

        // -- HISTORY LOGIC --
        function saveHistory() {
            if (state.historyIndex < state.history.length - 1) {
                state.history = state.history.slice(0, state.historyIndex + 1);
            }
            state.history.push({
                grid: JSON.parse(JSON.stringify(state.grid)),
                envGrid: JSON.parse(JSON.stringify(state.envGrid))
            });
            if (state.history.length > 30) {
                state.history.shift();
            } else {
                state.historyIndex++;
            }
        }

        function restoreFromHistory(record) {
            state.grid = JSON.parse(JSON.stringify(record.grid));
            state.envGrid = JSON.parse(JSON.stringify(record.envGrid));
            draw2DMap();
            if(state.view === '3d') build3DScene();
        }

        document.getElementById('btn-undo').addEventListener('click', () => {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                restoreFromHistory(state.history[state.historyIndex]);
            }
        });

        document.getElementById('btn-redo').addEventListener('click', () => {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                restoreFromHistory(state.history[state.historyIndex]);
            }
        });

        // Binding Level Heights
        document.getElementById('h-l0').addEventListener('input', e => { state.levelHeights[0] = parseFloat(e.target.value)||1; if(state.view==='3d') build3DScene(); });
        document.getElementById('h-l1').addEventListener('input', e => { state.levelHeights[1] = parseFloat(e.target.value)||1; if(state.view==='3d') build3DScene(); });
        document.getElementById('h-l2').addEventListener('input', e => { state.levelHeights[2] = parseFloat(e.target.value)||1; if(state.view==='3d') build3DScene(); });

        const lightConfig = { color: '#ffaa55', intensity: 1.5, distance: 8, flicker: true };
        
        document.getElementById('setting-thickness').addEventListener('input', (e) => {
            state.thickness = parseFloat(e.target.value);
            document.getElementById('val-thickness').innerText = state.thickness;
            if(state.view === '3d') build3DScene();
        });

        document.getElementById('light-color').addEventListener('input', (e) => {
            lightConfig.color = e.target.value;
            torchLight.color.set(lightConfig.color);
        });
        document.getElementById('light-intensity').addEventListener('input', (e) => {
            lightConfig.intensity = parseFloat(e.target.value);
            document.getElementById('val-intensity').innerText = lightConfig.intensity;
            torchLight.intensity = lightConfig.intensity;
        });
        document.getElementById('light-distance').addEventListener('input', (e) => {
            lightConfig.distance = parseFloat(e.target.value);
            document.getElementById('val-distance').innerText = lightConfig.distance;
            torchLight.distance = lightConfig.distance;
        });
        document.getElementById('light-flicker').addEventListener('change', (e) => {
            lightConfig.flicker = e.target.checked;
        });

        document.getElementById('btn-add-preset').addEventListener('click', () => {
            const gothicColors = ['#4a0909', '#5c3a21', '#2a2e35', '#3b2b1c', '#611c1c'];
            const randomColor = gothicColors[Math.floor(Math.random() * gothicColors.length)];
            const newId = addPreset(null, randomColor, 'none');
            setActivePreset(newId);
        });

        // -- GENERATOR UI TOGGLE --
        document.getElementById('toggle-generator').addEventListener('click', () => {
            const opts = document.getElementById('generator-options');
            const chev = document.getElementById('gen-chevron');
            if (opts.classList.contains('hidden')) {
                opts.classList.remove('hidden');
                chev.style.transform = 'rotate(0deg)';
            } else {
                opts.classList.add('hidden');
                chev.style.transform = 'rotate(180deg)';
            }
        });

        document.getElementById('gen-structured').addEventListener('change', (e) => {
            const probOpts = document.getElementById('gen-prob-options');
            const castleOpts = document.getElementById('gen-castle-options');
            if (e.target.checked) {
                probOpts.classList.remove('hidden');
                document.getElementById('gen-castle').checked = false;
                castleOpts.classList.add('hidden');
                castleOpts.classList.remove('grid');
            } else {
                probOpts.classList.add('hidden');
            }
        });

        document.getElementById('gen-castle').addEventListener('change', (e) => {
            const castleOpts = document.getElementById('gen-castle-options');
            if (e.target.checked) {
                document.getElementById('gen-structured').checked = false;
                document.getElementById('gen-prob-options').classList.add('hidden');
                castleOpts.classList.remove('hidden');
                castleOpts.classList.add('grid');
            } else {
                castleOpts.classList.add('hidden');
                castleOpts.classList.remove('grid');

        // -- TEXTURES --
        function createProceduralTexture(type, color1, color2) {
            const c = document.createElement('canvas');
            c.width = 128; c.height = 128;
            const ctx = c.getContext('2d');
            
            if (type === 'tile') {
                ctx.fillStyle = color1; ctx.fillRect(0,0,128,128);
                ctx.fillStyle = color2;
                ctx.fillRect(0,0,64,64); ctx.fillRect(64,64,64,64);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
                ctx.strokeRect(0,0,64,64); ctx.strokeRect(64,0,64,64);
                ctx.strokeRect(0,64,64,64); ctx.strokeRect(64,64,64,64);
            } else if (type === 'brick') {
                ctx.fillStyle = color1; ctx.fillRect(0,0,128,128); 
                ctx.fillStyle = color2;
                for(let y=0; y<4; y++) {
                    let offset = (y % 2 === 0) ? 0 : -16;
                    for(let x=0; x<5; x++) {
                        ctx.fillRect(offset + x*32 + 2, y*32 + 2, 28, 28);
                    }
                }
            } else if (type === 'plaster') {
                ctx.fillStyle = color1; ctx.fillRect(0,0,128,128);
                for(let i=0; i<1000; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? color2 : 'rgba(0,0,0,0.1)';
                    ctx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
                }
            } else if (type === 'stairs') {
                ctx.fillStyle = color1; ctx.fillRect(0,0,128,128);
                ctx.fillStyle = color2;
                for(let i=0; i<8; i++) {
                    ctx.fillRect(0, i*16 + 8, 128, 8); 
                }
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                for(let i=0; i<8; i++) {
                    ctx.fillRect(0, i*16 + 14, 128, 2); 
                }
            } else if (type === 'ladder') {
                ctx.fillStyle = color1; ctx.fillRect(0,0,128,128);
                ctx.fillStyle = color2;
                ctx.fillRect(32, 0, 10, 128); 
                ctx.fillRect(86, 0, 10, 128); 
                for(let i=0; i<8; i++) {
                    ctx.fillRect(32, 16 + i*16, 64, 6); 
                }
            }
            return c.toDataURL();
        }

        const defaultFloorURL = createProceduralTexture('tile', '#1a0d0d', '#2e1c1c');
        const defaultWallURL = createProceduralTexture('brick', '#0a0505', '#2a1f16');
        const defaultCeilURL = createProceduralTexture('plaster', '#140a0a', '#0a0505');
        const defaultStairsURL = createProceduralTexture('stairs', '#140e0a', '#3b2b1c');
        const defaultLadderURL = createProceduralTexture('ladder', '#0a0505', '#7a6347');
        const defaultObjectURL = createProceduralTexture('plaster', '#2a1f16', '#140e0a');

        function addPreset(name, color, specialType, textures, keepFloor = true, keepCeil = true, rotateFloor = false, rotateCeil = false, objectRotation = 0, rotX=0, rotY=0, rotZ=0, scale=1, autoScaleHeight=false, trimPos='none') {
            const id = Date.now() + Math.floor(Math.random()*1000);
            
            // Allow ladders/stairs to punch holes by default, normal rooms shouldn't punch holes
            if (keepFloor === undefined) keepFloor = (specialType !== 'stairs' && specialType !== 'ladder');
            if (keepCeil === undefined) keepCeil = (specialType !== 'stairs' && specialType !== 'ladder');

            const newPreset = {
                id,
                name: name || `Preset ${state.presets.length + 1}`,
                color: color || '#8f1717',
                specialType: specialType || 'none',
                keepFloor: keepFloor,
                keepCeil: keepCeil,
                rotateFloor: rotateFloor,
                rotateCeil: rotateCeil,
                objectRotation: objectRotation,
                rotX: rotX, rotY: rotY, rotZ: rotZ, scale: scale,
                autoScaleHeight: autoScaleHeight,
                trimPos: trimPos,
                models: {}, 
                textures: textures || {
                    floor: defaultFloorURL, ceil: defaultCeilURL,
                    north: defaultWallURL, south: defaultWallURL,
                    east: defaultWallURL, west: defaultWallURL,
                    object: defaultObjectURL,
                    trim: defaultObjectURL
                }
            };
            if (!newPreset.textures.trim) newPreset.textures.trim = defaultObjectURL;

            state.presets.push(newPreset);
            updateMaterialCache(newPreset);
            renderPresetList();
            return id;
        }

        function duplicatePreset(id) {
            const original = state.presets.find(p => p.id === id);
            if(!original) return;
            const newId = addPreset(
                original.name + ' (Copy)', 
                original.color, 
                original.specialType, 
                JSON.parse(JSON.stringify(original.textures)),
                original.keepFloor,
                original.keepCeil,
                original.rotateFloor,
                original.rotateCeil,
                original.objectRotation,
                original.rotX, original.rotY, original.rotZ, original.scale,
                original.autoScaleHeight,
                original.trimPos
            );
            
            const newPreset = state.presets.find(p => p.id === newId);
            if (original.models) {
                newPreset.models = { ...original.models };
            }
            if (modelCache[original.id]) modelCache[newId] = modelCache[original.id];
            if (trimModelCache[original.id]) trimModelCache[newId] = trimModelCache[original.id];
            
            setActivePreset(newId);
        }

        // --- IMPROVED RANDOM GENERATOR ---
        function generateRandomDungeon() {
            if (document.getElementById('gen-auto-seed').checked) {
                document.getElementById('gen-seed').value = Math.random().toString(36).substring(2, 10);
            }
            
            let seedStr = document.getElementById('gen-seed').value.trim();
            if (!seedStr) {
                seedStr = Math.random().toString(36).substring(2, 10);
                document.getElementById('gen-seed').value = seedStr;
            }
            
            let seed = 0;
            for (let i = 0; i < seedStr.length; i++) {
                seed = Math.imul(31, seed) + seedStr.charCodeAt(i) | 0;
            }
            
            function mulberry32(a) {
                return function() {
                  var t = a += 0x6D2B79F5;
                  t = Math.imul(t ^ t >>> 15, t | 1);
                  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                  return ((t ^ t >>> 14) >>> 0) / 4294967296;
                }
            }
            const rng = mulberry32(seed);

            const min = parseInt(document.getElementById('input-min').value) || 15;
            const max = parseInt(document.getElementById('input-max').value) || 40;
            
            const isStructured = document.getElementById('gen-structured').checked;
            const isCastle = document.getElementById('gen-castle').checked;
            const preventOverlap = document.getElementById('gen-overlap').checked;
            const isMulti = document.getElementById('gen-multilevel').checked;
            
            const pRoom = parseInt(document.getElementById('gen-p-room').value) || 60;
            const pHall = parseInt(document.getElementById('gen-p-hall').value) || 40;
            const pJunc = parseInt(document.getElementById('gen-p-junc').value) || 30;

            const hallWidth = Math.max(1, parseInt(document.getElementById('gen-hall-width').value) || 1);
            const roomMin = Math.max(2, parseInt(document.getElementById('gen-room-min').value) || 3);
            const roomMax = Math.max(roomMin, parseInt(document.getElementById('gen-room-max').value) || 7);

            const specificConn = document.getElementById('gen-connection') ? document.getElementById('gen-connection').value : 'auto';
            const envChance = parseInt(document.getElementById('gen-env-chance').value) || 0;

            if (isMulti) {
                state.grid = [
                    Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)),
                    Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)),
                    Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null))
                ];
                state.envGrid = [
                    Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)),
                    Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null)),
                    Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null))
                ];
            } else {
                state.grid[state.level] = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null));
                state.envGrid[state.level] = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(null));
            }

            const layersToGen = isMulti ? [0, 1, 2] : [state.level];

            layersToGen.forEach(layer => {
                const targetCells = Math.floor(rng() * (max - min + 1)) + min;
                let placedCount = 0;
                
                if (isCastle) {
                    let exits = [];
                    const cx = Math.floor(GRID_SIZE / 2);
                    const cz = Math.floor(GRID_SIZE / 2);
                    
                    function canPlaceWithPadding(px, pz, w, h, startX, startZ, dir) {
                        if (px < 1 || px+w >= GRID_SIZE-1 || pz < 1 || pz+h >= GRID_SIZE-1) return false;
                        for(let i=-1; i<=w; i++) {
                            for(let j=-1; j<=h; j++) {
                                let chkX = px + i; let chkZ = pz + j;
                                if (chkX >= 0 && chkX < GRID_SIZE && chkZ >= 0 && chkZ < GRID_SIZE) {
                                    if (state.grid[layer][chkX][chkZ] !== null) {
                                        if (dir.dx === 1 && chkX === px - 1) continue;
                                        if (dir.dx === -1 && chkX === px + w) continue;
                                        if (dir.dz === 1 && chkZ === pz - 1) continue;
                                        if (dir.dz === -1 && chkZ === pz + h) continue;
                                        return false;
                                    }
                                }
                            }
                        }
                        return true;
                    }

                    function placeFeature(startX, startZ, dir, type) {
                        let w, h, ox, oz;
                        let len = 0;
                        if (type === 'hall') {
                            len = Math.floor(rng() * 5) + 4; 
                            w = dir.dx !== 0 ? len : hallWidth;
                            h = dir.dz !== 0 ? len : hallWidth;
                            
                            ox = dir.dx === -1 ? -len + 1 : 0;
                            if (dir.dx === 0) ox = -Math.floor(hallWidth/2);
                            
                            oz = dir.dz === -1 ? -len + 1 : 0;
                            if (dir.dz === 0) oz = -Math.floor(hallWidth/2);
                        } else {
                            w = Math.floor(rng() * (roomMax - roomMin + 1)) + roomMin;
                            h = Math.floor(rng() * (roomMax - roomMin + 1)) + roomMin;
                            
                            if (dir.dx !== 0) {
                                ox = dir.dx === -1 ? -w + 1 : 0;
                                oz = -Math.floor(h/2);
                            } else {
                                ox = -Math.floor(w/2);
                                oz = dir.dz === -1 ? -h + 1 : 0;
                            }
                        }

                        let px = startX + ox;
                        let pz = startZ + oz;

                        if (!canPlaceWithPadding(px, pz, w, h, startX, startZ, dir)) return null;

                        for(let i=0; i<w; i++) {
                            for(let j=0; j<h; j++) {
                                state.grid[layer][px+i][pz+j] = state.activePresetId;
                                placedCount++;
                            }
                        }

                        let newExits = [];
                        if (type === 'hall') {
                            let endX = startX + dir.dx * len;
                            let endZ = startZ + dir.dz * len;
                            newExits.push({x: endX, z: endZ, dir: dir}); 
                            
                            for(let step=1; step<len-1; step+=2) {
                                if (rng() > 0.5) {
                                    if (dir.dx !== 0) {
                                        if (rng() > 0.5) newExits.push({x: startX + dir.dx * step, z: pz - 1, dir: {dx: 0, dz: -1}});
                                        else newExits.push({x: startX + dir.dx * step, z: pz + h, dir: {dx: 0, dz: 1}});
                                    } else {
                                        if (rng() > 0.5) newExits.push({x: px - 1, z: startZ + dir.dz * step, dir: {dx: -1, dz: 0}});
                                        else newExits.push({x: px + w, z: startZ + dir.dz * step, dir: {dx: 1, dz: 0}});
                                    }
                                }
                            }
                        } else {
                            let maxDim = Math.max(w, h);
                            let numExits = 0;
                            if (maxDim >= 7) numExits = Math.floor(rng() * 3) + 1; 
                            else if (maxDim >= 5) numExits = Math.floor(rng() * 2) + 1; 
                            else if (rng() > 0.3) numExits = 1; 

                            let addDirs = [];
                            if (dir.dx !== 0) { addDirs.push({dx: dir.dx, dz: 0}); addDirs.push({dx: 0, dz: 1}); addDirs.push({dx: 0, dz: -1}); }
                            else { addDirs.push({dx: 0, dz: dir.dz}); addDirs.push({dx: 1, dz: 0}); addDirs.push({dx: -1, dz: 0}); }

                            addDirs.sort(() => rng() - 0.5);
                            
                            for(let i=0; i<numExits && i<addDirs.length; i++) {
                                let extraDir = addDirs[i];
                                let exX, exZ;
                                if (extraDir.dx === 1) { exX = px + w; exZ = pz + Math.floor(h/2); }
                                else if (extraDir.dx === -1) { exX = px - 1; exZ = pz + Math.floor(h/2); }
                                else if (extraDir.dz === 1) { exX = px + Math.floor(w/2); exZ = pz + h; }
                                else if (extraDir.dz === -1) { exX = px + Math.floor(w/2); exZ = pz - 1; }
                                newExits.push({x: exX, z: exZ, dir: extraDir});
                            }
                        }
                        return newExits;
                    }

                    // 1. Central Courtyard / Keep
                    const keepSize = Math.max(roomMax, Math.floor(rng() * 3) + roomMax);
                    let kx = cx - Math.floor(keepSize/2);
                    let kz = cz - Math.floor(keepSize/2);
                    for(let i=0; i<keepSize; i++) {
                        for(let j=0; j<keepSize; j++) {
                            state.grid[layer][kx+i][kz+j] = state.activePresetId;
                            placedCount++;
                        }
                    }
                    
                    exits.push({x: Math.floor(cx), z: kz - 1, dir: {dx: 0, dz: -1}}); 
                    exits.push({x: Math.floor(cx), z: kz + keepSize, dir: {dx: 0, dz: 1}}); 
                    exits.push({x: kx - 1, z: Math.floor(cz), dir: {dx: -1, dz: 0}}); 
                    exits.push({x: kx + keepSize, z: Math.floor(cz), dir: {dx: 1, dz: 0}}); 

                    let attempts = 0;
                    while(placedCount < targetCells && attempts < 2000) {
                        attempts++;
                        
                        if (exits.length === 0) {
                             let validWalls = [];
                             for(let x=1; x<GRID_SIZE-1; x++) {
                                 for(let z=1; z<GRID_SIZE-1; z++) {
                                     if (state.grid[layer][x][z]) {
                                         if (!state.grid[layer][x+1][z]) validWalls.push({x: x+1, z: z, dir: {dx: 1, dz: 0}});
                                         if (!state.grid[layer][x-1][z]) validWalls.push({x: x-1, z: z, dir: {dx: -1, dz: 0}});
                                         if (!state.grid[layer][x][z+1]) validWalls.push({x: x, z: z+1, dir: {dx: 0, dz: 1}});
                                         if (!state.grid[layer][x][z-1]) validWalls.push({x: x, z: z-1, dir: {dx: 0, dz: -1}});
                                     }
                                 }
                             }
                             if (validWalls.length > 0) exits.push(validWalls[Math.floor(rng() * validWalls.length)]);
                             else break;
                        }

                        let exitIdx = rng() > 0.3 ? exits.length - 1 : Math.floor(rng() * exits.length);
                        let ex = exits[exitIdx];
                        exits.splice(exitIdx, 1);
                        
                        let type = 'room';
                        if (rng() < 0.4) type = 'hall';
                        
                        if (placedCount < keepSize*keepSize + 25 && rng() > 0.1) type = 'hall';

                        let newE = placeFeature(ex.x, ex.z, ex.dir, type);
                        if (newE) exits.push(...newE);
                    }

                } else if (!isStructured) {
                    let cx = Math.floor(GRID_SIZE / 2);
                    let cz = Math.floor(GRID_SIZE / 2);
                    while (placedCount < targetCells) {
                        if (!state.grid[layer][cx][cz]) {
                            state.grid[layer][cx][cz] = state.activePresetId;
                            placedCount++;
                        }
                        const dir = Math.floor(rng() * 4);
                        if (dir === 0 && cz > 2) cz--; 
                        else if (dir === 1 && cz < GRID_SIZE - 3) cz++; 
                        else if (dir === 2 && cx > 2) cx--; 
                        else if (dir === 3 && cx < GRID_SIZE - 3) cx++; 
                    }
                } else {
                    let cells = []; 
                    
                    function placeBlock(x, z, w, h) {
                        if (preventOverlap) {
                            for(let i=0; i<w; i++) {
                                for(let j=0; j<h; j++) {
                                    if (x+i < 0 || x+i >= GRID_SIZE || z+j < 0 || z+j >= GRID_SIZE) return false;
                                    if (state.grid[layer][x+i][z+j] !== null) return false;
                                }
                            }
                        } else {
                            if (x < 0 || x+w >= GRID_SIZE || z < 0 || z+h >= GRID_SIZE) return false;
                        }

                        for(let i=0; i<w; i++) {
                            for(let j=0; j<h; j++) {
                                if (!state.grid[layer][x+i][z+j]) placedCount++;
                                state.grid[layer][x+i][z+j] = state.activePresetId;
                                cells.push({x: x+i, z: z+j});
                            }
                        }
                        return true;
                    }

                    placeBlock(Math.floor(GRID_SIZE/2)-1, Math.floor(GRID_SIZE/2)-1, 3, 3);
                    
                    let attempts = 0;
                    while(placedCount < targetCells && attempts < 1000) {
                        attempts++;
                        if (cells.length === 0) break;
                        
                        let base;
                        if (rng() * 100 < pJunc) {
                            base = cells[Math.floor(rng() * cells.length)]; 
                        } else {
                            base = cells[cells.length - 1]; 
                        }

                        let dir = Math.floor(rng() * 4); 
                        let roll = rng() * (pRoom + pHall);
                        let isRoom = roll < pRoom;

                        let w, h, nx, nz;
                        if (isRoom) {
                            w = Math.floor(rng() * 3) + 3; 
                            h = Math.floor(rng() * 3) + 3;
                        } else {
                            let len = Math.floor(rng() * 5) + 3; 
                            w = (dir === 2 || dir === 3) ? len : 1;
                            h = (dir === 0 || dir === 1) ? len : 1;
                        }

                        if (dir === 0) { nx = base.x - Math.floor(w/2); nz = base.z - h; } 
                        else if (dir === 1) { nx = base.x - Math.floor(w/2); nz = base.z + 1; } 
                        else if (dir === 2) { nx = base.x + 1; nz = base.z - Math.floor(h/2); } 
                        else { nx = base.x - w; nz = base.z - Math.floor(h/2); } 

                        placeBlock(nx, nz, w, h);
                    }
                }

                // Environment Spawn Logic
                if (envChance > 0) {
                    const envPresets = state.presets.filter(p => p.specialType === 'environment');
                    if (envPresets.length > 0) {
                        for(let x=1; x<GRID_SIZE-1; x++) {
                            for(let z=1; z<GRID_SIZE-1; z++) {
                                if (state.grid[layer][x][z]) {
                                    let wN = !state.grid[layer][x][z-1];
                                    let wS = !state.grid[layer][x][z+1];
                                    let wE = !state.grid[layer][x+1][z];
                                    let wW = !state.grid[layer][x-1][z];
                                    
                                    let isCorner = (wN && wE) || (wN && wW) || (wS && wE) || (wS && wW);
                                    
                                    if (isCorner && rng() * 100 < envChance) {
                                        state.envGrid[layer][x][z] = envPresets[Math.floor(rng() * envPresets.length)].id;
                                    }
                                }
                            }
                        }
                    }
                }
            });

            if (isMulti) {
                let possibleConns = [];
                if (specificConn === 'auto') {
                    possibleConns = state.presets.filter(p => p.specialType === 'stairs' || p.specialType === 'ladder');
                } else {
                    let s = state.presets.find(p => p.id == specificConn);
                    if (s) possibleConns.push(s);
                }
                
                for(let layer = 0; layer < 2; layer++) {
                    let overlaps = [];
                    for(let x=0; x<GRID_SIZE; x++) {
                        for(let z=0; z<GRID_SIZE; z++) {
                            if (state.grid[layer][x][z] && state.grid[layer+1][x][z]) {
                                let hasAdjUpper = false;
                                if (x>0 && state.grid[layer+1][x-1][z]) hasAdjUpper = true;
                                if (x<GRID_SIZE-1 && state.grid[layer+1][x+1][z]) hasAdjUpper = true;
                                if (z>0 && state.grid[layer+1][x][z-1]) hasAdjUpper = true;
                                if (z<GRID_SIZE-1 && state.grid[layer+1][x][z+1]) hasAdjUpper = true;

                                let hasAdjLower = false;
                                if (x>0 && state.grid[layer][x-1][z]) hasAdjLower = true;
                                if (x<GRID_SIZE-1 && state.grid[layer][x+1][z]) hasAdjLower = true;
                                if (z>0 && state.grid[layer][x][z-1]) hasAdjLower = true;
                                if (z<GRID_SIZE-1 && state.grid[layer][x][z+1]) hasAdjLower = true;

                                if (hasAdjUpper && hasAdjLower) {
                                    overlaps.push({x, z});
                                }
                            }
                        }
                    }
                    
                    if (overlaps.length > 0 && possibleConns.length > 0) {
                        let spot = overlaps[Math.floor(rng() * overlaps.length)];
                        let conn = possibleConns[Math.floor(rng() * possibleConns.length)];
                        state.grid[layer][spot.x][spot.z] = conn.id;
                        state.grid[layer+1][spot.x][spot.z] = conn.id; 
                    }
                }
            }

            draw2DMap();
            saveHistory();
            if (state.view === '3d') build3DScene();
        }

        const canvas = document.getElementById('map-canvas');

        canvas.width = GRID_SIZE * CELL_SIZE;

        function draw2DMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#2a1f16'; 
            ctx.lineWidth = 1;
            
            for(let x=0; x<=GRID_SIZE; x++) {
                ctx.beginPath(); ctx.moveTo(x * CELL_SIZE, 0); ctx.lineTo(x * CELL_SIZE, canvas.height); ctx.stroke();
            }
            for(let y=0; y<=GRID_SIZE; y++) {
                ctx.beginPath(); ctx.moveTo(0, y * CELL_SIZE); ctx.lineTo(canvas.width, y * CELL_SIZE); ctx.stroke();
            }

            if (state.level > 0) {
                ctx.globalAlpha = 0.25;
                for(let x=0; x<GRID_SIZE; x++) {
                    for(let z=0; z<GRID_SIZE; z++) {
                        const cellId = state.grid[state.level - 1][x][z];
                        const currentCellId = state.grid[state.level][x][z];
                        if (cellId && !currentCellId) {
                            const preset = state.presets.find(p => p.id === cellId);
                            ctx.fillStyle = preset ? preset.color : '#8f1717';
                            ctx.fillRect(x * CELL_SIZE + 1, z * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                        }
                    }
                }
                ctx.globalAlpha = 1.0;
            }

            for(let x=0; x<GRID_SIZE; x++) {
                for(let z=0; z<GRID_SIZE; z++) {
                    const cellId = state.grid[state.level][x][z];
                    if (cellId) {
                        const preset = state.presets.find(p => p.id === cellId);
                        ctx.fillStyle = preset ? preset.color : '#8f1717';
                        ctx.fillRect(x * CELL_SIZE + 1, z * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                        ctx.strokeRect(x * CELL_SIZE + 1, z * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                        
                        if (preset && preset.specialType === 'ladder') {
                            ctx.fillStyle = 'rgba(0,0,0,0.7)';
                            ctx.fillRect(x * CELL_SIZE + 6, z * CELL_SIZE + 4, 2, CELL_SIZE - 8);
                            ctx.fillRect(x * CELL_SIZE + CELL_SIZE - 8, z * CELL_SIZE + 4, 2, CELL_SIZE - 8);
                            for(let i=0; i<4; i++) ctx.fillRect(x * CELL_SIZE + 6, z * CELL_SIZE + 6 + (i*4), CELL_SIZE - 12, 2);
                        } else if (preset && preset.specialType === 'stairs') {
                            ctx.fillStyle = 'rgba(0,0,0,0.5)';
                            for(let i=0; i<4; i++) ctx.fillRect(x * CELL_SIZE + 2, z * CELL_SIZE + 4 + (i*5), CELL_SIZE - 4, 3);
                        } else if (preset && preset.specialType === 'custom') {
                            ctx.fillStyle = '#ebd8c3';
                            ctx.beginPath();
                            ctx.arc(x * CELL_SIZE + CELL_SIZE/2, z * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/4, 0, Math.PI*2);
                            ctx.fill();
                        }
                    }
                    
                    const envId = state.envGrid[state.level][x][z];
                    if (envId) {
                        const envPreset = state.presets.find(p => p.id === envId);
                        ctx.fillStyle = envPreset ? envPreset.color : '#4a5c40';
                        ctx.beginPath();
                        ctx.arc(x * CELL_SIZE + CELL_SIZE/2, z * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/3, 0, Math.PI*2);
                        ctx.fill();
                        ctx.strokeStyle = '#000';
                        ctx.stroke();
                    }
                }
            }

            ctx.fillStyle = 'rgba(212, 196, 183, 0.9)'; 
            ctx.font = 'bold 16px "Cinzel", serif';
            ctx.fillText(`Editing Level ${state.level + 1}`, 15, 30);
        }

        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor(((e.clientX - rect.left) * scaleX) / CELL_SIZE);
            const z = Math.floor(((e.clientY - rect.top) * scaleY) / CELL_SIZE);
            return {x, z};
        }

        let hasUnsavedChanges = false;

        function handleCanvasAction(e) {
            const pos = getGridPos(e);
            if (pos.x >= 0 && pos.x < GRID_SIZE && pos.z >= 0 && pos.z < GRID_SIZE) {
                if (pos.x !== state.lastDrawCoords.x || pos.z !== state.lastDrawCoords.y) {
                    
                    const p = state.presets.find(pr => pr.id === state.activePresetId);
                    
                    if (state.tool === 'draw' && p) {
                        if (p.specialType === 'environment') {
                            state.envGrid[state.level][pos.x][pos.z] = state.activePresetId;
                        } else {
                            state.grid[state.level][pos.x][pos.z] = state.activePresetId;
                        }
                        hasUnsavedChanges = true;
                    } else if (state.tool === 'erase_tile') {
                        if (state.grid[state.level][pos.x][pos.z]) {
                            state.grid[state.level][pos.x][pos.z] = null;
                            hasUnsavedChanges = true;
                        }
                    } else if (state.tool === 'erase_env') {
                        if (state.envGrid[state.level][pos.x][pos.z]) {
                            state.envGrid[state.level][pos.x][pos.z] = null;
                            hasUnsavedChanges = true;
                        }
                    }
                    
                    state.lastDrawCoords = {x: pos.x, y: pos.z};
                    draw2DMap();
                }
            }
        }
