        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020101);
        scene.fog = new THREE.FogExp2(0x050202, 0.15);

        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        const container3D = document.getElementById('three-container');
        container3D.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffeedd, 0.05);
        scene.add(ambientLight);

        const torchLight = new THREE.PointLight(lightConfig.color, lightConfig.intensity, lightConfig.distance);
        scene.add(torchLight);

        const dungeonGroup = new THREE.Group();
        scene.add(dungeonGroup);

        const planeGeo = new THREE.PlaneGeometry(1, 1);
        
        function getMaterial(color, url) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.9,
                metalness: 0.2,
                side: THREE.DoubleSide
            });
            if (url && url.trim() !== '') {
                textureLoader.load(url, (texture) => {
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    mat.map = texture;
                    mat.color.setHex(0xffffff); 
                    mat.needsUpdate = true;
                });
            }
            return mat;
        }

        function updateMaterialCache(preset) {
            if (preset.specialType === 'environment') return; 

            materialCache[preset.id] = {
                floor: getMaterial(preset.color, preset.textures.floor),
                ceil: getMaterial(preset.color, preset.textures.ceil),
                north: getMaterial(preset.color, preset.textures.north),
                south: getMaterial(preset.color, preset.textures.south),
                east: getMaterial(preset.color, preset.textures.east),
                west: getMaterial(preset.color, preset.textures.west),
                object: getMaterial(preset.color, preset.textures.object || defaultObjectURL),
                trim: getMaterial(preset.color, preset.textures.trim || defaultObjectURL)
            };
        }

        function build3DScene() {
            while(dungeonGroup.children.length > 0){ 
                dungeonGroup.remove(dungeonGroup.children[0]); 
            }

            const t = state.thickness || 0.05;
            const slabGeo = new THREE.BoxGeometry(1, t, 1);

            let foundStart = false;

            for(let y=0; y<3; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    for(let z=0; z<GRID_SIZE; z++) {
                        const presetId = state.grid[y][x][z];
                        if (!presetId) continue;

                        const preset = state.presets.find(p => p.id === presetId);
                        const mats = materialCache[presetId];
                        if(!preset || !mats) continue;

                        if (!foundStart && y === state.level) {
                            camera.position.set(x, getLayerBottom(y) + t + 0.475, z);
                            camera.rotation.set(0,0,0);
                            euler.set(0,0,0);
                            foundStart = true;
                        }
                        
                        const cellBelowId = y > 0 ? state.grid[y-1][x][z] : null;
                        const cellBelow = cellBelowId ? state.presets.find(p => p.id === cellBelowId) : null;
                        const cellAboveId = y < 2 ? state.grid[y+1][x][z] : null;
                        const cellAbove = cellAboveId ? state.presets.find(p => p.id === cellAboveId) : null;

                        let drawFloor = true;
                        if (!preset.keepFloor) drawFloor = false;

                        let drawCeil = true;
                        if (!preset.keepCeil) drawCeil = false;

                        // Draw Floor with thickness
                        if (drawFloor) {
                            if (preset.models && preset.models.floor) {
                                let floorM = preset.models.floor.clone();
                                if (preset.rotateFloor) floorM.rotation.y = Math.PI / 2;
                                floorM.position.set(x, getLayerBottom(y) + t/2, z);
                                floorM.userData = { layer: y, category: 'Floor', isCustomRoot: true };
                                dungeonGroup.add(floorM);
                            } else {
                                let floor = new THREE.Mesh(slabGeo, mats.floor);
                                if (preset.rotateFloor) floor.rotation.y = Math.PI / 2;
                                floor.position.set(x, getLayerBottom(y) + t/2, z);
                                floor.userData = { layer: y, category: 'Floor' };
                                floor.name = `Floor_${y}_${x}_${z}`;
                                dungeonGroup.add(floor);

                                let bottomMat = mats.ceil;
                                if (cellBelowId && materialCache[cellBelowId]) {
                                    bottomMat = materialCache[cellBelowId].ceil;
                                }
                                let floorBot = new THREE.Mesh(planeGeo, bottomMat);
                                floorBot.rotation.x = Math.PI / 2; 
                                if (preset.rotateFloor) floorBot.rotation.z = Math.PI / 2; 
                                floorBot.position.set(x, getLayerBottom(y) - 0.002, z);
                                floorBot.userData = { layer: y, category: 'Ceiling' };
                                floorBot.name = `FloorUnderside_${y}_${x}_${z}`;
                                dungeonGroup.add(floorBot);
                            }
                        }

                        // Draw Ceiling with thickness
                        if (drawCeil) {
                            if (preset.models && preset.models.ceil) {
                                let ceilM = preset.models.ceil.clone();
                                if (preset.rotateCeil) ceilM.rotation.y = Math.PI / 2;
                                ceilM.position.set(x, getLayerTop(y) - t/2, z);
                                ceilM.userData = { layer: y, category: 'Ceiling', isCustomRoot: true };
                                dungeonGroup.add(ceilM);
                            } else {
                                let ceil = new THREE.Mesh(slabGeo, mats.ceil);
                                if (preset.rotateCeil) ceil.rotation.y = Math.PI / 2;
                                ceil.position.set(x, getLayerTop(y) - t/2, z);
                                ceil.userData = { layer: y, category: 'Ceiling' };
                                ceil.name = `Ceiling_${y}_${x}_${z}`;
                                dungeonGroup.add(ceil);

                                let topMat = mats.floor;
                                let ceilTop = new THREE.Mesh(planeGeo, topMat);
                                ceilTop.rotation.x = -Math.PI / 2; 
                                if (preset.rotateCeil) ceilTop.rotation.z = Math.PI / 2;
                                ceilTop.position.set(x, getLayerTop(y) + 0.002, z);
                                ceilTop.userData = { layer: y, category: 'Floor' };
                                ceilTop.name = `CeilingTopside_${y}_${x}_${z}`;
                                dungeonGroup.add(ceilTop);
                            }
                        }

                        // 3D Models for Stairs and Ladders
                        const hFactor = preset.autoScaleHeight ? state.levelHeights[y] : 1;

                        if (preset.specialType === 'stairs') {
                            let objGroup = new THREE.Group();
                            objGroup.position.set(x, getLayerCenter(y), z);
                            objGroup.rotation.y = THREE.MathUtils.degToRad(preset.objectRotation || 0);

                            if (preset.models && preset.models.object) {
                                let cModel = preset.models.object.clone();
                                const scale = preset.scale || 1;
                                cModel.scale.set(scale, scale * hFactor, scale);
                                objGroup.add(cModel);
                            } else {
                                let numSteps = Math.max(1, Math.round(10 * hFactor));
                                const stepH = hFactor / numSteps;
                                const stepD = 1.0 / numSteps;
                                const stepGeo = new THREE.BoxGeometry(1, Math.min(stepH, 0.1), stepD); 
                                
                                for(let i = 0; i < numSteps; i++) {
                                    let step = new THREE.Mesh(stepGeo, mats.object); 
                                    let localY = -hFactor/2 + (stepH/2) + (i * stepH);
                                    let localZ = 0.5 - (stepD/2) - (i * stepD);
                                    step.position.set(0, localY, localZ); 
                                    step.userData = { layer: y, category: 'Stairs' };
                                    step.name = `StairStep_${i}_${y}_${x}_${z}`;
                                    objGroup.add(step);
                                }
                            }
                            
                            objGroup.userData = { isCustomRoot: true };
                            dungeonGroup.add(objGroup);
                        } else if (preset.specialType === 'ladder') {
                            let objGroup = new THREE.Group();
                            objGroup.position.set(x, getLayerCenter(y), z);
                            objGroup.rotation.y = THREE.MathUtils.degToRad(preset.objectRotation || 0);

                            if (preset.models && preset.models.object) {
                                let cModel = preset.models.object.clone();
                                const scale = preset.scale || 1;
                                cModel.scale.set(scale, scale * hFactor, scale);
                                objGroup.add(cModel);
                            } else {
                                const poleGeo = new THREE.BoxGeometry(0.05, hFactor, 0.05);
                                const rungGeo = new THREE.BoxGeometry(0.5, 0.05, 0.05);
                                
                                let poleL = new THREE.Mesh(poleGeo, mats.object);
                                poleL.position.set(-0.25, 0, -0.45); 
                                poleL.userData = { layer: y, category: 'Ladder' };
                                poleL.name = `LadderPoleL_${y}_${x}_${z}`;
                                
                                let poleR = new THREE.Mesh(poleGeo, mats.object);
                                poleR.position.set(0.25, 0, -0.45);
                                poleR.userData = { layer: y, category: 'Ladder' };
                                poleR.name = `LadderPoleR_${y}_${x}_${z}`;
                                
                                objGroup.add(poleL);
                                objGroup.add(poleR);
                                
                                let numRungs = Math.max(1, Math.round(8 * hFactor));
                                let rungSpacing = hFactor / numRungs;

                                for(let i=0; i<numRungs; i++) {
                                    let rung = new THREE.Mesh(rungGeo, mats.object);
                                    let localY = -hFactor/2 + (rungSpacing/2) + (i * rungSpacing);
                                    rung.position.set(0, localY, -0.45);
                                    rung.userData = { layer: y, category: 'Ladder' };
                                    rung.name = `LadderRung_${i}_${y}_${x}_${z}`;
                                    objGroup.add(rung);
                                }
                            }
                            
                            objGroup.userData = { isCustomRoot: true };
                            dungeonGroup.add(objGroup);
                        } else if (preset.specialType === 'custom' && modelCache[preset.id]) {
                            let objGroup = modelCache[preset.id].clone();
                            objGroup.position.set(x, getLayerBottom(y) + t, z); 
                            objGroup.rotation.set(
                                THREE.MathUtils.degToRad(preset.rotX || 0),
                                THREE.MathUtils.degToRad(preset.rotY || 0),
                                THREE.MathUtils.degToRad(preset.rotZ || 0)
                            );
                            const scale = preset.scale || 1;
                            objGroup.scale.set(scale, scale, scale);
                            objGroup.userData = { isCustomRoot: true };
                            dungeonGroup.add(objGroup);
                        }

                        const placeTrim = (wallDir) => {
                             if (!preset.trimPos || preset.trimPos === 'none') return;
                             
                             const trimYBot = getLayerBottom(y) + t + 0.05;
                             const trimYTop = getLayerTop(y) - t - 0.05;
                             
                             let rotY = 0; let ox = 0; let oz = 0;
                             if (wallDir === 'north') { oz = -0.475; rotY = 0; }
                             if (wallDir === 'south') { oz = 0.475; rotY = Math.PI; }
                             if (wallDir === 'east') { ox = 0.475; rotY = -Math.PI/2; }
                             if (wallDir === 'west') { ox = -0.475; rotY = Math.PI/2; }

                             const buildT = (posY) => {
                                 let tMesh;
                                 if (trimModelCache[preset.id]) {
                                     tMesh = trimModelCache[preset.id].clone();
                                     tMesh.traverse(child => {
                                         if (child.isMesh && (!child.material.map)) {
                                             child.material = mats.trim;
                                         }
                                     });
                                 } else if (preset.models && preset.models.trim) {
                                     tMesh = preset.models.trim.clone();
                                 } else {
                                     tMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.1, 0.05), mats.trim);
                                 }
                                 tMesh.position.set(x + ox, posY, z + oz);
                                 tMesh.rotation.y = rotY;
                                 tMesh.userData = { layer: y, category: 'Wall', isCustomRoot: !!(preset.models && preset.models.trim) || !!trimModelCache[preset.id] }; 
                                 dungeonGroup.add(tMesh);
                             };

                             if (preset.trimPos === 'bottom' || preset.trimPos === 'both') buildT(trimYBot);
                             if (preset.trimPos === 'top' || preset.trimPos === 'both') buildT(trimYTop);
                        };

                        const placeWall = (wallDir, rotY, ox, oz, isWallPresent) => {
                            if (!isWallPresent) return;
                            
                            if (preset.models && preset.models[wallDir]) {
                                let wModel = preset.models[wallDir].clone();
                                wModel.scale.y = state.levelHeights[y];
                                wModel.rotation.y = rotY;
                                wModel.position.set(x + ox, getLayerCenter(y), z + oz);
                                wModel.userData = { layer: y, category: 'Wall', isCustomRoot: true };
                                dungeonGroup.add(wModel);
                                placeTrim(wallDir);
                            } else {
                                let w = new THREE.Mesh(planeGeo, mats[wallDir]);
                                w.scale.y = state.levelHeights[y];
                                w.rotation.y = rotY;
                                w.position.set(x + ox, getLayerCenter(y), z + oz);
                                w.userData = { layer: y, category: 'Wall' };
                                w.name = `Wall_${wallDir}_${y}_${x}_${z}`;
                                dungeonGroup.add(w);
                                placeTrim(wallDir);
                            }
                        };

                        placeWall('north', 0, 0, -0.5, (z === 0 || !state.grid[y][x][z-1]));
                        placeWall('south', Math.PI, 0, 0.5, (z === GRID_SIZE - 1 || !state.grid[y][x][z+1]));
                        placeWall('west', Math.PI / 2, -0.5, 0, (x === 0 || !state.grid[y][x-1][z]));
                        placeWall('east', -Math.PI / 2, 0.5, 0, (x === GRID_SIZE - 1 || !state.grid[y][x+1][z]));
                    }
                }
            }

            // Environment Objects
            for(let y=0; y<3; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    for(let z=0; z<GRID_SIZE; z++) {
                        const envId = state.envGrid[y][x][z];
                        if (!envId) continue;
                        
                        const preset = state.presets.find(p => p.id === envId);
                        if (!preset || preset.specialType !== 'environment' || !modelCache[preset.id]) continue;
                        
                        let objGroup = modelCache[preset.id].clone();
                        objGroup.position.set(x, getLayerBottom(y) + t, z);
                        objGroup.rotation.set(
                            THREE.MathUtils.degToRad(preset.rotX || 0),
                            THREE.MathUtils.degToRad(preset.rotY || 0),
                            THREE.MathUtils.degToRad(preset.rotZ || 0)
                        );
                        const scale = preset.scale || 1;
                        objGroup.scale.set(scale, scale, scale);
                        objGroup.userData = { isCustomRoot: true };
                        dungeonGroup.add(objGroup);
                    }
                }
            }

            if (!foundStart) {
                camera.position.set(GRID_SIZE/2, getLayerBottom(state.level) + t + 0.475, GRID_SIZE/2);
            }
        }

        const keys = { w: false, a: false, s: false, d: false, ' ': false, 'shift': false };
        window.addEventListener('keydown', e => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true; 
        });
        window.addEventListener('keyup', e => { 
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false; 
        });

        let isDraggingCam = false;
        let prevMouse = { x: 0, y: 0 };
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const PI_2 = Math.PI / 2;

        container3D.addEventListener('mousedown', (e) => {
            if(state.view !== '3d') return;
            isDraggingCam = true;
            prevMouse = { x: e.clientX, y: e.clientY };
        });
        
        window.addEventListener('mouseup', () => isDraggingCam = false);
        
        window.addEventListener('mousemove', (e) => {
            if (isDraggingCam && state.view === '3d') {
                const deltaX = e.clientX - prevMouse.x;
                const deltaY = e.clientY - prevMouse.y;
                
                euler.setFromQuaternion(camera.quaternion);
                euler.y -= deltaX * 0.005;
                euler.x -= deltaY * 0.005;
                euler.x = Math.max(-PI_2 + 0.01, Math.min(PI_2 - 0.01, euler.x));
                
                camera.quaternion.setFromEuler(euler);
                prevMouse = { x: e.clientX, y: e.clientY };
            }
        });

        const clock = new THREE.Clock();
        
        let velocityY = 0;
        const GRAVITY = 15;

        function updatePlayer(delta) {
            const speed = 3.5 * delta;
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0; 
            direction.normalize();
            
            const right = new THREE.Vector3().crossVectors(camera.up, direction).normalize();

            let moveX = 0; let moveZ = 0;
            if(keys.w) { moveX += direction.x; moveZ += direction.z; }
            if(keys.s) { moveX -= direction.x; moveZ -= direction.z; }
            if(keys.a) { moveX += right.x; moveZ += right.z; }
            if(keys.d) { moveX -= right.x; moveZ -= right.z; }

            const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
            if(len > 0) {
                moveX = (moveX/len) * speed;
                moveZ = (moveZ/len) * speed;
            }

            let gy = 0;
            let currentBase = 0;
            for(let i=0; i<3; i++) {
                const top = currentBase + state.levelHeights[i];
                if (camera.position.y >= currentBase && camera.position.y <= top) {
                    gy = i;
                    break;
                }
                currentBase = top;
                if (i === 2 && camera.position.y > currentBase) gy = 2; 
            }

            if(moveX !== 0 || moveZ !== 0) {
                const nextX = camera.position.x + moveX;
                const nextZ = camera.position.z + moveZ;
                
                const gx = Math.round(nextX);
                const gz = Math.round(nextZ);
                
                if (gx >= 0 && gx < GRID_SIZE && gz >= 0 && gz < GRID_SIZE) {
                    if (state.grid[gy][gx][gz]) {
                        camera.position.x = nextX;
                        camera.position.z = nextZ;
                    }
                }
            }
            
            const cx = Math.round(camera.position.x);
            const cz = Math.round(camera.position.z);
            
            let currentCellId = state.grid[gy][cx][cz];
            let preset = currentCellId ? state.presets.find(p => p.id === currentCellId) : null;
            
            let isShaft = false;
            if (preset && (preset.specialType === 'stairs' || preset.specialType === 'ladder')) {
                isShaft = true;
            } else if (gy > 0) {
                let cellBelowId = state.grid[gy-1][cx][cz];
                let cellBelowP = cellBelowId ? state.presets.find(p => p.id === cellBelowId) : null;
                if (cellBelowP && (cellBelowP.specialType === 'stairs' || cellBelowP.specialType === 'ladder')) {
                    isShaft = true;
                }
            }

            function hasFloor(layer, x, z) {
                if (layer < 0 || layer > 2) return false;
                let cId = state.grid[layer][x][z];
                if (!cId) return false;
                let p = state.presets.find(pr => pr.id === cId);
                if (!p) return false;
                
                let floorExists = true;
                if (!p.keepFloor) floorExists = false; 
                
                let belowId = layer > 0 ? state.grid[layer-1][x][z] : null;
                let belowP = belowId ? state.presets.find(pr => pr.id === belowId) : null;
                if (belowP && (belowP.specialType === 'stairs' || belowP.specialType === 'ladder') && !belowP.keepCeil) floorExists = false; 
                
                return floorExists;
            }

            let groundY = 0.475; // absolute minimum
            let foundGround = false;
            for (let y = gy; y >= 0; y--) {
                if (hasFloor(y, cx, cz)) {
                    groundY = getLayerBottom(y) + state.thickness + 0.475;
                    foundGround = true;
                    break;
                }
            }

            if (isShaft) {
                velocityY = 0; 
                if (keys[' ']) camera.position.y += speed;
                if (keys['shift']) camera.position.y -= speed;
            } else {
                if (camera.position.y > groundY) {
                    velocityY -= GRAVITY * delta;
                } else {
                    velocityY = 0;
                }
                camera.position.y += velocityY * delta;
                if (camera.position.y < groundY) {
                    camera.position.y = groundY;
                    velocityY = 0;
                }
            }

            const time = clock.getElapsedTime();
            torchLight.position.copy(camera.position);
            
            if (lightConfig.flicker) {
                torchLight.intensity = lightConfig.intensity + Math.sin(time * 20) * (lightConfig.intensity * 0.1) + Math.sin(time * 35) * (lightConfig.intensity * 0.05);
            } else {
                torchLight.intensity = lightConfig.intensity;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (state.view === '3d') {
                const delta = clock.getDelta();
                updatePlayer(delta);
                renderer.render(scene, camera);
            } else {
                clock.getDelta();
            }
        }

        function resize3D() {
            if(state.view !== '3d') return;
            const width = container3D.clientWidth;
            const height = container3D.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', resize3D);

        // Monetization: Interstitial Proxy Wrapper
        function showInterstitialAd(callback) {
            // Replace this console log with your Google AdSense Interstitial trigger code
            // Ex: googletag.cmd.push(function() { googletag.display('div-gpt-ad-interstitial'); });
            console.log("Simulating Interstitial Ad...");
            
            setTimeout(() => {
                callback();
            }, 500); 
        }

        function performExport() {
            if (typeof THREE.GLTFExporter === 'undefined') {
                alert("GLTFExporter failed to load. Please check your internet connection.");
                return;
            }

            if (dungeonGroup.children.length === 0) {
                build3DScene();
            }

            if (dungeonGroup.children.length === 0) {
                alert("The map is empty! Draw some cells before exporting.");
                return;
            }

            const mergeFlags = {
                'Floor': document.getElementById('opt-floor') ? document.getElementById('opt-floor').checked : false,
                'Ceiling': document.getElementById('opt-ceil') ? document.getElementById('opt-ceil').checked : false,
                'Wall': document.getElementById('opt-wall') ? document.getElementById('opt-wall').checked : false,
                'Stairs': document.getElementById('opt-stairs') ? document.getElementById('opt-stairs').checked : false,
                'Ladder': document.getElementById('opt-ladder') ? document.getElementById('opt-ladder').checked : false
            };

            const isOptimizeChecked = Object.values(mergeFlags).some(flag => flag === true);

            const toHide = [];
            const mergedMeshes = [];

            if (isOptimizeChecked && typeof THREE.BufferGeometryUtils !== 'undefined') {
                const categoriesToMerge = {};
                
                dungeonGroup.updateMatrixWorld(true);
                
                dungeonGroup.traverse((mesh) => {
                    if (mesh.isMesh && mesh.userData && mesh.userData.category && !mesh.userData.isCustomRoot) {
                        const cat = mesh.userData.category;
                        const layer = mesh.userData.layer;
                        
                        if (mergeFlags[cat]) {
                            toHide.push(mesh);
                            
                            let mat = mesh.material;
                            if (Array.isArray(mat)) mat = mat[0];
                            if (!mat) return;
                            
                            const key = `Layer${layer}_${cat}_${mat.uuid}`;
                            if (!categoriesToMerge[key]) {
                                categoriesToMerge[key] = { material: mat, geometries: [], name: `Layer${layer}_${cat}_Merged` };
                            }
                            
                            const geom = mesh.geometry.clone();
                            geom.applyMatrix4(mesh.matrixWorld);
                            categoriesToMerge[key].geometries.push(geom);
                        }
                    }
                });
                
                for (let key in categoriesToMerge) {
                    try {
                        const data = categoriesToMerge[key];
                        if (data.geometries.length > 0) {
                            let mergedGeom = THREE.BufferGeometryUtils.mergeBufferGeometries(data.geometries, false);
                            if (mergedGeom) {
                                mergedGeom = THREE.BufferGeometryUtils.mergeVertices(mergedGeom);
                                const mergedMesh = new THREE.Mesh(mergedGeom, data.material);
                                mergedMesh.name = data.name;
                                mergedMeshes.push(mergedMesh);
                            }
                        }
                    } catch (e) {
                        console.warn('Failed to merge a group block:', e);
                    }
                }
            }

            toHide.forEach(m => m.visible = false);
            mergedMeshes.forEach(m => dungeonGroup.add(m));

            const exporter = new THREE.GLTFExporter();
            exporter.parse(
                dungeonGroup, 
                function (gltf) {
                    mergedMeshes.forEach(m => dungeonGroup.remove(m));
                    toHide.forEach(m => m.visible = true);

                    if (gltf instanceof ArrayBuffer) {
                        const blob = new Blob([gltf], { type: 'application/octet-stream' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.style.display = 'none';
                        link.href = url;
                        link.download = 'Dungeon_Relic.glb';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    } else {
                        const output = JSON.stringify(gltf, null, 2);
                        const blob = new Blob([output], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.style.display = 'none';
                        link.href = url;
                        link.download = 'Dungeon_Relic.gltf';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    }
                },
                { binary: true }
            );
        }

        document.getElementById('btn-export').addEventListener('click', () => {
            showInterstitialAd(performExport);
        });

        function init() {
            const p1Id = addPreset('Stone Dungeon', '#2e2520', 'none');
            
            const ladderId = addPreset('Rusted Ladder', '#4a3624', 'ladder', {
                floor: defaultFloorURL, ceil: defaultCeilURL,
                north: defaultWallURL, south: defaultWallURL,
                east: defaultWallURL, west: defaultWallURL,
                object: defaultLadderURL,
                trim: defaultObjectURL
            }, false, false, false, false, 0, 0,0,0, 1, false, 'none');

            const stairsId = addPreset('Wooden Stairs', '#5c3a21', 'stairs', {
                floor: defaultFloorURL, ceil: defaultCeilURL,
                north: defaultWallURL, south: defaultWallURL,
                east: defaultWallURL, west: defaultWallURL,
                object: defaultStairsURL,
                trim: defaultObjectURL
            }, false, false, false, false, 0, 0,0,0, 1, false, 'none');

            setActivePreset(p1Id);
            
            state.grid[0][Math.floor(GRID_SIZE/2)][Math.floor(GRID_SIZE/2)] = p1Id;
            draw2DMap();
            saveHistory();
            animate();
        }

        window.onload = init;
    </script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
